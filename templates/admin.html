<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Galindo&display=swap" rel="stylesheet">

<style>
        :root{
        --green: #459B72;
        --green-card: #479F75;
        --orange: #F28344;
        --soft-blue: #94BFC8; 
        --soft-pink: #F5B8B7;
        }
        *{
            margin:0;
            
        }
        h1{
            font-family: "Fredoka", sans-serif;
            font-optical-sizing: auto;
            font-weight: 300;
            color:var(--green)  
        }
        #shop{
            color:var(--orange)
        }
        #order{
            text-decoration: None;
            color:white;
            background-color: var(--orange);
            font-family: "Fredoka", sans-serif;
            font-optical-sizing: auto;
            font-weight: bold;
            text-align: center;
            margin:5px;
        }
        nav{
            background-color: var(--orange);
            
        }
        li{
            list-style: none;
        }
        a{
            text-decoration: none;
            color:white;
            font-family: "Fredoka", sans-serif;
            font-optical-sizing: auto;
            font-weight: 300;
            font-weight: bold;
            transition:all 1s;
        }

        a:hover{
            color:var(--soft-blue)
        }
        
        ul{
            margin:0;
        }
      
        
        footer{
            background-color:var(--orange);
        }
        footer h2{
            color:white;
            font-family: "Galindo", sans-serif;
            font-weight: 400;
            font-style: normal;
            
        }
        main h2{
            text-align: center;
            margin :5px;
            font-family: "Galindo", sans-serif;
            font-weight: 400;
            font-style: normal;
            color:var(--orange);
        }
        .form-group{
            text-align:center;
            font-family: "Galindo", sans-serif;
            font-weight: 100;
            font-style: normal;
        }
        .btn-success{
            background-color: var(--orange);
            border-color: var(--orange);
        }
        label{
            margin:5px;
        }
    </style>
</head>
<body>
    <header class="border-bottom p-4 border-2 d-flex align-items-center justify-content-evenly">
        <img src="{{url_for('static',filename='icon.png')}}" alt="icon" width="100">
        <h1>Burger<span id="shop">Shop</span></h1>
        <a href="" id="order" class="border rounded-pill p-2">Order Now !</a>
    </header>
    <nav>
        <ul class="d-flex p-3 align-items-center justify-content-evenly">
            <li>
                <a href="https://www.facebook.com/profile.php?id=100089783388424">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-facebook" viewBox="0 0 16 16">
                    <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951"/>
                </svg>
                </a>
            </li>
            <li><a href="/">Home</a></li>
            <li><a href="/cart">Cart</a></li>
            <li><a href="/admin">Admin</a></li>
        </ul>
    </nav>
    <main>
        <h2>Admin</h2>
        <div class="border rounded m-5 border-5">
            <h2>Add Product</h2>
            <form method="POST" class="d-flex flex-column justify-content-center align-items-center gap-3">
                <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" name="name" autocomplete="off" class="form-control">
                </div>
                <div class="form-group">
                <label for="img">Image:</label>
                <input type="text" autocomplete="off" name="img" class="form-control">
                </div>
                <input type="submit" class="btn btn-success mb-3" value="Add">                
                
            </form>
        </div>
    </main>
    <footer class="p-3 mt-3 d-flex flex-column align-items-center">
        <h2 style="margin:0;">Hamoda Elemary &copy;</h2>
    </footer>
    </body>
